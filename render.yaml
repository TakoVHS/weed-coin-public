services:
  - type: web
    name: weed-coin-public
    runtime: node
    repo: https://github.com/TakoVHS/weed-coin-public
    branch: main
    rootDir: .
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20.11.1
      - key: NEXT_PUBLIC_SITE_URL
        value: https://weed-coin.cash
      - key: PUBLIC_SITE_URL
        value: https://weed-coin.cash
      - key: PUBLIC_TELEGRAM_URL
        value: https://t.me/weedcoin_chat
      - key: PUBLIC_X_URL
        value: https://twitter.com/WeedCoin
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_MODEL
        value: openai/gpt-4.1-mini
      - key: OPENROUTER_HTTP_REFERER
        value: https://weed-coin.cash
      - key: PAYMENT_FLOW_MODE
        value: preview
      - key: ENABLE_WALLET_CONNECT
        value: false
      - key: ENABLE_TOKEN_CHECKOUT
        value: false
